<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Radhe Krishna File Library</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <style>
    :root {
      --bg-light: radial-gradient(circle at top, #ffd6e8 0, #fff 40%, #ffe9b3 100%);
      --card-light: #ffffff;
      --text-light: #222;
      --border-light: #ffd1f0;
      --bg-dark: #000000;
      --card-dark: #111111;
      --text-dark: #f7e9b0;
      --border-dark: #b8860b;
      --accent-pink: #ff7eb3;
    }
    body {
      min-height: 100vh; margin: 0; display: flex; justify-content: center;
      font-family: system-ui, -apple-system, sans-serif; background: var(--bg-light); color: var(--text-light);
    }
    body.dark { background: var(--bg-dark); color: var(--text-dark); }
    .app-container { width: 100%; max-width: 520px; background: rgba(255, 255, 255, 0.96); border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.18); border: 1px solid var(--border-light); margin: 8px; min-height: calc(100vh - 16px); overflow: hidden; }
    body.dark .app-container { background: rgba(10, 10, 10, 0.96); border-color: var(--border-dark); }
    .header { background: linear-gradient(135deg, #ff7eb3, #ff758c, #ffb347); padding: 14px 12px; color: white; display: flex; align-items: center; gap: 10px; position: relative; }
    body.dark .header { background: linear-gradient(135deg, #000, #2b1b00, #8b6508); }
    .rk-image-wrap { width: 64px; height: 64px; border-radius: 50%; overflow: hidden; border: 2px solid white; }
    .rk-image-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .content { padding: 12px; }
    .card { background: #fff; border-radius: 12px; padding: 12px; margin-bottom: 10px; border: 1px solid #ffe0f2; }
    body.dark .card { background: #111; border-color: #3b2a00; }
    .card-title { font-size: 14px; font-weight: 600; margin-bottom: 8px; display: flex; justify-content: space-between; }
    .input-group { display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; }
    input { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
    body.dark input { background: #181818; color: #f7e9b0; border-color: #444; }
    button { border: none; border-radius: 999px; padding: 10px 14px; font-size: 13px; cursor: pointer; width: 100%; font-weight: bold; }
    .btn-primary { background: linear-gradient(135deg, #ff7eb3, #ff758c); color: white; }
    body.dark .btn-primary { background: linear-gradient(135deg, #8b6508, #ffb347); color: #000; }
    .btn-secondary { background: #f3f3f3; color: #444; }
    .btn-danger { background: #ff4b5c; color: white; padding: 4px 8px; font-size: 11px; width: auto; border-radius: 4px; }
    .btn-open { background: #0a8f3c; color: white; padding: 4px 8px; font-size: 11px; width: auto; border-radius: 4px; }
    .login-section, .main-section { display: none; }
    .active { display: block; }
    .file-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
    body.dark .file-item { border-bottom-color: #333; }
    .file-name { flex: 1; word-break: break-all; margin-right: 10px; }
    .file-actions { display: flex; gap: 4px; }
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 60px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid gold; }
    .nav-item { color: gold; font-size: 12px; text-align: center; cursor: pointer; }
  </style>
</head>
<body>

  <div id="loaderOverlay" style="position:fixed;inset:0;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center;z-index:9999;color:gold;font-weight:bold;">
    <div>Radhe Krishna... Loading...</div>
  </div>

  <div class="app-container">
    <div class="header">
      <div class="rk-image-wrap"><img src="https://asset.gecdesigns.com/img/wallpapers/cute-radha-krishna-hd-wallpaper-sr04112404-cover.webp"></div>
      <div>
        <h1 style="margin:0; font-size:18px;">Radhe Krishna File Library</h1>
        <p style="margin:0; font-size:11px;">Secure Personal Document Cloud Storage</p>
      </div>
      <button id="darkToggle" style="width:auto; position:absolute; right:10px; background:none; color:inherit; font-size:16px;">☀️</button>
    </div>

    <div class="content">
      <div id="loginSection" class="login-section active card">
        <div class="card-title">Login (ଲଗିନ୍ କରନ୍ତୁ)</div>
        <div class="input-group"><input type="text" id="loginUsername" placeholder="Username"></div>
        <div class="input-group"><input type="password" id="loginPassword" placeholder="Password"></div>
        <button id="loginBtn" class="btn-primary">Login</button>
        <p id="loginStatus" style="color:red; font-size:12px;"></p>
        <button id="showRegisterBtn" style="background:none; color:var(--accent-pink);">New User? Register Here</button>
      </div>

      <div id="registerSection" class="login-section card">
        <div class="card-title">Register Account</div>
        <div class="input-group"><input type="text" id="regUsername" placeholder="Choose Username"></div>
        <div class="input-group"><input type="password" id="regPassword" placeholder="Choose Password"></div>
        <button id="registerBtn" class="btn-primary">Register</button>
        <p id="registerStatus" style="color:green; font-size:12px;"></p>
        <button id="showLoginBtn" style="background:none; color:var(--accent-pink);">Back to Login</button>
      </div>

      <div id="mainSection" class="main-section">
        <div class="card">
          <div class="card-title">Upload Documents (PDF, Excel, Images, Docs)</div>
          <div class="input-group"><input type="file" id="fileInput"></div>
          <div class="input-group"><input type="text" id="fileNameInput" placeholder="Save file as name (e.g. Invoice.pdf)"></div>
          <button id="uploadBtn" class="btn-primary">Upload File</button>
          <p id="uploadStatus" style="font-size:12px; color:green;"></p>
        </div>

        <div class="card">
          <div class="card-title">Your Secure Cloud Files</div>
          <input type="text" id="searchInput" placeholder="Search files..." style="margin-bottom:8px;">
          <div id="filesList"></div>
        </div>

        <button id="logoutBtn" class="btn-secondary" style="margin-top:20px;">Logout (ଲଗ୍ ଆଉଟ୍)</button>
      </div>
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item" onclick="window.scrollTo({top:0, behavior:'smooth'})">🏠<br>Home</div>
    <div class="nav-item" onclick="document.getElementById('fileInput').click()">⬆️<br>Upload</div>
    <div class="nav-item" onclick="loadFiles()">📁<br>Refresh</div>
  </div>

  <script>
    const BASE_URL = "https://radhe-krishna-files-backend.onrender.com";
    
    function showLoader() { document.getElementById("loaderOverlay").style.display = "flex"; }
    function hideLoader() { document.getElementById("loaderOverlay").style.display = "none"; }

    // Read active login profile from LocalStorage token mapping
    function getAuthUser() { return localStorage.getItem("rkLoggedUser"); }

    window.addEventListener('load', () => {
      if (getAuthUser()) {
        showMainInterface();
      }
    });

    function showMainInterface() {
      document.getElementById("loginSection").classList.remove("active");
      document.getElementById("registerSection").classList.remove("active");
      document.getElementById("mainSection").classList.add("active");
      loadFiles();
    }

    document.getElementById("showRegisterBtn").onclick = () => {
      document.getElementById("loginSection").classList.remove("active");
      document.getElementById("registerSection").classList.add("active");
    };
    document.getElementById("showLoginBtn").onclick = () => {
      document.getElementById("registerSection").classList.remove("active");
      document.getElementById("loginSection").classList.add("active");
    };

    // LOGIN
    document.getElementById("loginBtn").onclick = async () => {
      const username = document.getElementById("loginUsername").value.trim();
      const password = document.getElementById("loginPassword").value.trim();
      if(!username || !password) return;

      showLoader();
      try {
        const r = await fetch(`${BASE_URL}/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });
        const d = await r.json();
        hideLoader();
        if(d.success) {
          localStorage.setItem("rkLoggedUser", d.username);
          showMainInterface();
        } else {
          document.getElementById("loginStatus").textContent = d.error || "Login Failed";
        }
      } catch(e) { hideLoader(); alert("Backend connection lost."); }
    };

    // REGISTER
    document.getElementById("registerBtn").onclick = async () => {
      const username = document.getElementById("regUsername").value.trim();
      const password = document.getElementById("regPassword").value.trim();
      if(!username || !password) return;

      showLoader();
      try {
        const r = await fetch(`${BASE_URL}/register`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });
        const d = await r.json();
        hideLoader();
        if(d.success) {
          document.getElementById("registerStatus").textContent = "Success! Please log in.";
          setTimeout(() => document.getElementById("showLoginBtn").click(), 1500);
        } else {
          document.getElementById("registerStatus").textContent = d.error;
        }
      } catch(e) { hideLoader(); }
    };

    // LOGOUT
    document.getElementById("logoutBtn").onclick = () => {
      localStorage.removeItem("rkLoggedUser");
      location.reload();
    };

// LOAD FILES (UPDATED FOR TIMESTAMPS AND EXPIRATION TRACKING)
async function loadFiles() {
  const user = getAuthUser();
  if (!user) return;

  try {
    const r = await fetch(`${BASE_URL}/files`, {
      method: "GET",
      headers: { "X-User": user } // Custom Auth Identification Header
    });
    
    const files = await r.json();
    const container = document.getElementById("filesList");
    container.innerHTML = "";

    if (!files || !files.length || files.error) {
      container.innerHTML = "<p style='color:#888; text-align:center;'>No files found</p>";
      return;
    }

    const filterText = document.getElementById("searchInput").value.toLowerCase();

    // Loop through the updated file objects array
    files.forEach(file => {
      // file.name contains the string name, file.uploadedAt contains the timestamp
      if (!file.name.toLowerCase().includes(filterText)) return;

      // Format the date/time beautifully based on your phone's local time setting
      const uploadDate = new Date(file.uploadedAt).toLocaleString();

      const row = document.createElement("div");
      row.className = "file-item";
      row.innerHTML = `
        <div class="file-name" style="display: flex; flex-direction: column; gap: 2px;">
          <span>📄 ${file.name}</span>
          <span style="font-size: 11px; color: #b3b3b3;">Uploaded: ${uploadDate}</span>
        </div>
        <div class="file-actions">
          <button class="btn-open" onclick="openFile('${file.name}')">Download</button>
          <button class="btn-danger" onclick="deleteFile('${file.name}')">Delete</button>
        </div>
      `;
      container.appendChild(row);
    });
  } catch(e) { 
    console.error("Error loading files layout view:", e); 
  }
}
    // Locate this block inside your index.html file:
document.getElementById("uploadBtn").onclick = async () => {
  const fileInput = document.getElementById("fileInput");
  let customName = document.getElementById("fileNameInput").value.trim();
  if(!fileInput.files.length) return alert("Select a file first");

  const file = fileInput.files[0];
  if(!customName) customName = file.name;
  if(!customName.includes(".")) customName += "." + file.name.split('.').pop();

  const renamedFile = new File([file], customName, { type: file.type });
  const formData = new FormData();
  formData.append("file", renamedFile); // This key name MUST match upload.single("file")

  showLoader();
  try {
    const r = await fetch(`${BASE_URL}/upload`, {
      method: "POST",
      headers: { 
        "X-User": getAuthUser() 
        // CRITICAL: DO NOT add "Content-Type" here! Let the browser generate it with the correct boundary wrapper.
      },
      body: formData
    });
    hideLoader();
    if(r.ok) {
      document.getElementById("uploadStatus").textContent = "File safely uploaded!";
      fileInput.value = "";
      document.getElementById("fileNameInput").value = "";
      setTimeout(() => { document.getElementById("uploadStatus").textContent = ""; }, 3000);
      loadFiles();
    } else {
      const errorData = await r.json();
      alert("Upload failed: " + (errorData.error || "Server issue"));
    }
  } catch(e) { hideLoader(); alert("Upload dropped due to connection issue."); }
};

    // OPEN/DOWNLOAD FILE VIA SIGNED S3 PIPELINE
    async function openFile(filename) {
      try {
        const r = await fetch(`${BASE_URL}/file/${encodeURIComponent(filename)}`, {
          method: "GET",
          headers: { "X-User": getAuthUser() }
        });
        const d = await r.json();
        if(d.url) {
          window.open(d.url, '_blank');
        } else { alert("File link expired or broken"); }
      } catch(e) { alert("Download connection failed"); }
    }

    // DELETE FILE
    async function deleteFile(filename) {
      if(!confirm("Permanently delete this file?")) return;
      showLoader();
      try {
        const r = await fetch(`${BASE_URL}/file/${encodeURIComponent(filename)}`, {
          method: "DELETE",
          headers: { "X-User": getAuthUser() }
        });
        hideLoader();
        if(r.ok) loadFiles();
      } catch(e) { hideLoader(); }
    }

    document.getElementById("searchInput").oninput = loadFiles;
    document.getElementById("darkToggle").onclick = () => document.body.classList.toggle("dark");
  </script>
</body>
</html>
